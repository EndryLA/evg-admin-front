<div class="modal-overlay" (click)="cancel.emit()">
  <div
    class="modal"
    role="dialog"
    aria-modal="true"
    aria-label="Nouvel utilisateur"
    (click)="$event.stopPropagation()">

    <header class="modal__head">
      <span class="eyebrow">Nouvel utilisateur</span>
      <h2 class="modal__title">Créer un accès</h2>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="grid">
        <label class="field field--span">
          <span class="field__label">Adresse e-mail</span>
          <input class="field__control" type="email" formControlName="email" autocomplete="off"
            placeholder="prenom.nom@exemple.com"
            [attr.aria-invalid]="form.controls.email.touched && form.controls.email.invalid" />
          @if (form.controls.email.touched && form.controls.email.invalid) {
            <span class="field__error">Indiquez une adresse e-mail valide.</span>
          }
        </label>

        <label class="field">
          <span class="field__label">Rôle</span>
          <select class="field__control" formControlName="role"
            [attr.aria-invalid]="form.controls.role.touched && form.controls.role.invalid">
            <option value="">Choisir un rôle</option>
            @for (r of roles; track r) {
              <option [value]="r">{{ roleLabel(r) }}</option>
            }
          </select>
          @if (form.controls.role.touched && form.controls.role.invalid) {
            <span class="field__error">Le rôle est requis.</span>
          }
        </label>

        <label class="field">
          <span class="field__label">Membre</span>
          <select class="field__control" formControlName="profileUuid"
            [attr.aria-invalid]="form.controls.profileUuid.touched && form.controls.profileUuid.invalid">
            <option value="">Choisir un membre</option>
            @for (p of profiles(); track p.uuid) {
              <option [value]="p.uuid">{{ p.label }}</option>
            }
          </select>
          @if (form.controls.profileUuid.touched && form.controls.profileUuid.invalid) {
            <span class="field__error">Le membre est requis.</span>
          }
        </label>

        <p class="modal__note field--span">
          Un lien d’activation sera envoyé à cette adresse. L’accès reste inactif tant que
          le membre n’a pas défini son mot de passe.
        </p>

        @if (error(); as err) {
          <p class="modal__error field--span" role="alert">{{ err }}</p>
        }
      </div>

      <footer class="modal__foot">
        <button type="button" class="btn modal__cancel" (click)="cancel.emit()" [disabled]="busy()">
          Annuler
        </button>
        <button type="submit" class="btn btn--primary" [disabled]="busy()">
          {{ busy() ? 'Création…' : 'Créer' }}
        </button>
      </footer>
    </form>
  </div>
</div>
