<div class="modal-overlay" (click)="cancel.emit()">
  <div
    class="modal"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="title()"
    (click)="$event.stopPropagation()">

    <header class="modal__head">
      <span class="eyebrow">{{ isEdit() ? 'Modifier le profil' : 'Nouveau profil' }}</span>
      <h2 class="modal__title">{{ title() }}</h2>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="grid">
        <label class="field">
          <span class="field__label">Prénom</span>
          <input class="field__control" formControlName="firstname" autocomplete="off"
            [attr.aria-invalid]="form.controls.firstname.touched && form.controls.firstname.invalid" />
          @if (form.controls.firstname.touched && form.controls.firstname.invalid) {
            <span class="field__error">Le prénom est requis.</span>
          }
        </label>

        <label class="field">
          <span class="field__label">Nom</span>
          <input class="field__control" formControlName="lastname" autocomplete="off"
            [attr.aria-invalid]="form.controls.lastname.touched && form.controls.lastname.invalid" />
          @if (form.controls.lastname.touched && form.controls.lastname.invalid) {
            <span class="field__error">Le nom est requis.</span>
          }
        </label>

        <label class="field">
          <span class="field__label">Téléphone</span>
          <input class="field__control" formControlName="phoneNumber" autocomplete="off" inputmode="tel" />
        </label>

        <label class="field">
          <span class="field__label">E-mail</span>
          <input class="field__control" type="email" formControlName="email" autocomplete="off"
            [attr.aria-invalid]="form.controls.email.touched && form.controls.email.invalid" />
          @if (form.controls.email.touched && form.controls.email.invalid) {
            <span class="field__error">Adresse e-mail invalide.</span>
          }
        </label>

        <label class="field">
          <span class="field__label">Date de naissance</span>
          <input class="field__control" type="date" formControlName="birthDate" />
        </label>

        <label class="field">
          <span class="field__label">Année d'adhésion</span>
          <input class="field__control" type="number" inputmode="numeric" min="1970" max="2100" placeholder="2021" formControlName="joinedAt" />
        </label>

        <label class="field">
          <span class="field__label">Type de membre</span>
          <select class="field__control" formControlName="membershipType">
            <option value="OUVRIER">Ouvrier</option>
            <option value="AIDE">Aide</option>
          </select>
        </label>

        <label class="field">
          <span class="field__label">Chef d'équipe</span>
          <select class="field__control" formControlName="leaderUuid">
            <option value="">Aucun</option>
            @for (l of leaderOptions(); track l.uuid) {
              <option [value]="l.uuid">{{ l.firstname }} {{ l.lastname }}</option>
            }
          </select>
        </label>

        <div class="field field--checkbox">
          <label class="checkbox">
            <input type="checkbox" formControlName="firstDepartment" />
            <span>Fait partie du 1<sup>er</sup> département</span>
          </label>
        </div>
      </div>

      <footer class="modal__foot">
        <button type="button" class="btn modal__cancel" (click)="cancel.emit()" [disabled]="busy()">
          Annuler
        </button>
        <button type="submit" class="btn btn--primary" [disabled]="busy()">
          {{ busy() ? 'Enregistrement…' : (isEdit() ? 'Enregistrer' : 'Créer') }}
        </button>
      </footer>
    </form>
  </div>
</div>
