<div class="scrim" (click)="close.emit()"></div>

<aside class="panel" role="dialog" aria-modal="true" [attr.aria-label]="item().name">
  <header class="panel__head">
    <div class="panel__head-row">
      <span class="eyebrow">Article</span>
      <button type="button" class="icon-btn" (click)="close.emit()" aria-label="Fermer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <h2 class="panel__title">{{ item().name }}</h2>
    <p class="panel__subtitle">{{ item().quantity }} en stock@if (item().stockLocation) { · {{ item().stockLocation }}}</p>
  </header>

  <div class="panel__body">
    <dl class="fields">
      <div class="field-row">
        <dt>Quantité</dt>
        <dd>{{ item().quantity }}</dd>
      </div>
      <div class="field-row">
        <dt>Emplacement</dt>
        <dd>{{ item().stockLocation || '—' }}</dd>
      </div>
      <div class="field-row">
        <dt>Responsable</dt>
        <dd>{{ responsible() }}</dd>
      </div>
      <div class="field-row field-row--last">
        <dt>Identifiant</dt>
        <dd class="mono">{{ item().uuid }}</dd>
      </div>
    </dl>
  </div>

  <footer class="panel__foot">
    <button type="button" class="btn btn--primary panel__edit" (click)="edit.emit()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      Modifier
    </button>
    <button type="button" class="btn panel__delete" (click)="remove.emit()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
      Supprimer
    </button>
  </footer>
</aside>
