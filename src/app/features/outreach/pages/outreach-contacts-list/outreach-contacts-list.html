<a [routerLink]="['/sorties', uuid(), 'gestion']" class="back">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  Gestion
</a>

<header class="list-head">
  <span class="eyebrow">Contacts</span>
  <h1>{{ outreach()?.name || 'Sortie' }}</h1>
  @if (outreach()) {
    <p class="list-head__sub">
      <span class="pill pill--{{ statusTone() }}">{{ statusLabel() }}</span>
    </p>
  }
</header>

@if (!loading() && !error() && contacts().length > 0) {
  <div class="filters">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input
        type="search"
        [value]="query()"
        (input)="onSearch($any($event.target).value)"
        placeholder="Rechercher un nom, une ville, un téléphone…"
        aria-label="Rechercher un contact" />
    </div>

    <!-- Mobile-only trigger for the bottom filter drawer. -->
    <button type="button" class="filter-toggle" (click)="openFilters()" aria-label="Filtres">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h18M6 12h12M10 19h4"/></svg>
      Filtres
      @if (activeFilterCount() > 0) {
        <span class="filter-toggle__badge">{{ activeFilterCount() }}</span>
      }
    </button>

    <!-- Filter controls: inline on desktop, a bottom drawer on mobile. -->
    <div class="filter-controls" [class.filter-controls--open]="filterDrawerOpen()">
      <div class="drawer-head">
        <h2 class="drawer-head__title">Filtres</h2>
        <button type="button" class="drawer-close" (click)="closeFilters()" aria-label="Fermer les filtres">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="drawer-body">
        <div class="tabs" role="tablist" aria-label="Filtrer par type">
          <button type="button" role="tab" [attr.aria-selected]="typeFilter() === 'ALL'" class="tab" [class.tab--active]="typeFilter() === 'ALL'" (click)="setType('ALL')">Tous</button>
          <button type="button" role="tab" [attr.aria-selected]="typeFilter() === 'CONTACT'" class="tab" [class.tab--active]="typeFilter() === 'CONTACT'" (click)="setType('CONTACT')">Contacts</button>
          <button type="button" role="tab" [attr.aria-selected]="typeFilter() === 'CONVERSION'" class="tab" [class.tab--active]="typeFilter() === 'CONVERSION'" (click)="setType('CONVERSION')">Conversions</button>
        </div>

        <label class="filter-field">
          <span class="filter-field__label">État civil</span>
          <select
            class="filter-select"
            [value]="civilState()"
            (change)="setCivilState($any($event.target).value)"
            aria-label="Filtrer par état civil">
            <option value="ALL">Tous</option>
            @for (opt of civilStateOptions; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </label>

        <label class="filter-field">
          <span class="filter-field__label">Secteur</span>
          <select
            class="filter-select"
            [value]="sector()"
            (change)="setSector($any($event.target).value)"
            aria-label="Filtrer par secteur">
            <option value="ALL">Tous les secteurs</option>
            @for (s of sectors; track s) {
              <option [value]="s">Secteur {{ s }}</option>
            }
            <option value="UNASSIGNED">Non renseigné</option>
          </select>
        </label>

        <label class="filter-field">
          <span class="filter-field__label">Évangélisé par</span>
          <input
            type="text"
            class="filter-input"
            [value]="evangelizedBy()"
            (input)="setEvangelizedBy($any($event.target).value)"
            placeholder="Nom…"
            aria-label="Filtrer par évangéliste" />
        </label>

        @if (hasActiveFilters()) {
          <button type="button" class="btn filter-reset" (click)="resetFilters()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.4 2.6L3 8"/><path d="M3 3v5h5"/></svg>
            Réinitialiser
          </button>
        }
      </div>

      <div class="drawer-foot">
        <button type="button" class="btn btn--primary drawer-apply" (click)="closeFilters()">
          Voir les résultats ({{ filtered().length }})
        </button>
      </div>
    </div>
  </div>

  <!-- Backdrop behind the mobile filter drawer. -->
  @if (filterDrawerOpen()) {
    <button type="button" class="drawer-backdrop" (click)="closeFilters()" aria-label="Fermer les filtres" tabindex="-1"></button>
  }
}

<app-outreach-contacts
  [contacts]="filtered()"
  [loading]="loading()"
  [error]="error()"
  [expanded]="true"
  [selectable]="true"
  [exportName]="exportName()"
  (retry)="load()" />
